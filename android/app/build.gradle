apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// ------------------------------------
// Environment files for react-native-config
// ------------------------------------
project.ext.envConfigFiles = [
    debug: ".env",
    release: ".env",
    devDebug: ".env",
    devRelease: ".env",
    uatDebug: ".env",
    uatRelease: ".env",
    prodDebug: ".env",
    prodRelease: ".env"
]

apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

// ------------------------------------
// Windows Node path fix for Reanimated
// ------------------------------------
project.ext.react = [
    nodeExecutableAndArgs: ["C:/Program Files/nodejs/node.exe"], // Adjust to your Node path
    REACT_NATIVE_NODE_MODULES_DIR: "D:/Projects/CoinMob/node_modules/react-native",
    REACT_NATIVE_WORKLETS_NODE_MODULES_DIR: "D:/Projects/CoinMob/node_modules/react-native-worklets"
]

react {
    autolinkLibrariesWithApp()
}

// ------------------------------------
// JSC / Hermes
// ------------------------------------
def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'



def packageJson = new File(rootDir, "../package.json")
def versionMatcher = packageJson.text =~ /"version"\s*:\s*"([^"]+)"/
def appVersionName = versionMatcher[0][1]
def appVersionCode = appVersionName.replace(".", "").toInteger()
// ------------------------------------
// Android configuration
// ------------------------------------
android {
    buildFeatures {
        buildConfig true
    }

    compileSdk rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    ndkVersion rootProject.ext.ndkVersion

    namespace "com.coinmob"

    defaultConfig {
        applicationId "com.coinmob"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
         //  AUTO VERSION
        versionCode appVersionCode
        versionName appVersionName
        resValue "string", "build_config_package", "com.coinmob"
    }

    flavorDimensions "environment"

    productFlavors {
       dev {
        dimension "environment"
        applicationIdSuffix ".dev"
        // versionNameSuffix "-dev"
        resValue "string", "app_name", "ZNBS DEV"
    }
    uat {
        dimension "environment"
        applicationIdSuffix ".uat"
        // versionNameSuffix "-uat"
        resValue "string", "app_name", "ZNBS MLIS UAT"
    }
    prod {
        dimension "environment"
        resValue "string", "app_name", "ZNBS MLIS"
    }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // APK splits for ARM only
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a"
            universalApk false
        }
    }
}

// ------------------------------------
// Dependencies
// ------------------------------------
dependencies {
    implementation("com.facebook.react:react-android")

    // Hermes or JSC
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
