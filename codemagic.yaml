scripts:
  - name: Install dependencies
    script: npm ci

  - name: Install CocoaPods
    script: |
      cd ios
      pod install
      cd ..

  - name: Build iOS IPA
    script: |
      xcode-project build-ipa \
        --workspace ios/CoinMob.xcworkspace \
        --scheme CoinMob \
        --export-options-plist ios/exportOptions.plist \
        --clean
