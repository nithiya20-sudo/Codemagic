workflows:
  react-native-ios:
    name: React Native iOS Build

    environment:
      xcode: 16.4
      vars:
        NODE_VERSION: '18'
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coinmob.app

    cache:
      cache_paths:
        - node_modules
        - ~/.cocoapods

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project ios/CoinMob.xcodeproj

      - name: Set build number # ← ADD THIS STEP
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "com.coinmob.app") + 1))
          cd ios
          agvtool new-version -all $BUILD_NUMBER
          cd ..

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/CoinMob.xcworkspace \
            --scheme CoinMob \
            --export-options-plist ios/exportOptions.plist \
            --clean

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: 'kavin@captivtech.com'
        password: 'wlhk-bhzs-xpwo-ouwx'
