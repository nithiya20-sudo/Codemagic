workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    environment:
      vars:
        NODE_VERSION: 18
      node: $NODE_VERSION

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          xcodebuild \
          -workspace ios/*.xcworkspace \
          -scheme $(xcodebuild -list -workspace ios/*.xcworkspace | grep -A 1 "Schemes:" | tail -n 1 | xargs) \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $CM_BUILD_DIR/build/ios/archive.xcarchive archive

    artifacts:
      - build/ios/archive.xcarchive

    publishing:
      email:
        recipients:
          - nithiyakalyani.r@Captiv.com
