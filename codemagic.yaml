scripts:
  - name: Install dependencies
    script: |
      npm ci
      ls node_modules/react-native

  - name: Clean iOS
    script: |
      cd ios
      rm -rf Pods Podfile.lock *.xcworkspace
      cd ..

  - name: Install CocoaPods
    script: |
      cd ios
      pod install --repo-update --verbose
      cd ..

  - name: Verify workspace creation
    script: |
      find ios -name "*.xcworkspace"
      ls -la ios

  - name: Set up code signing
    script: |
      xcode-project use-profiles --project ios/CoinMob.xcodeproj

  - name: Build IPA
    script: |
      xcode-project build-ipa \
        --workspace ios/CoinMob.xcworkspace \
        --scheme CoinMob \
        --clean
