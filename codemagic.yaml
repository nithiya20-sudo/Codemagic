workflows:
react-native-ios:
name: React Native iOS Build

environment:
  node: 18

  ios_signing:
    distribution_type: app_store
    bundle_identifier: com.coinmob.app

  vars:
    XCODE_WORKSPACE: 'ios/CoinMob.xcworkspace'
    XCODE_SCHEME: 'CoinMob'

cache:
  cache_paths:
    - node_modules
    - ios/Pods
    - ~/.cocoapods

scripts:
  - name: Install npm dependencies
    script: |
      npm ci

  - name: Verify React Native installation
    script: |
      ls -la node_modules/react-native

  - name: Install CocoaPods
    script: |
      cd ios
      pod install --repo-update
      cd ..

  - name: Debug iOS project files
    script: |
      echo "Checking iOS files..."
      ls -la ios
      echo "Searching for xcworkspace..."
      find ios -name "*.xcworkspace"
      echo "Searching for xcodeproj..."
      find ios -name "*.xcodeproj"

  - name: Set up code signing
    script: |
      xcode-project use-profiles \
        --project ios/CoinMob.xcodeproj

  - name: Build iOS IPA
    script: |
      xcode-project build-ipa \
        --workspace "$XCODE_WORKSPACE" \
        --scheme "$XCODE_SCHEME" \
        --clean

artifacts:
  - build/ios/ipa/*.ipa

publishing:
  app_store_connect:
    apple_id: 'kavin@captivtech.com'
    password: 'wlhk-bhzs-xpwo-ouwx'
