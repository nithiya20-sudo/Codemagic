workflows:
  react-native-ios:
    name: React Native iOS Build

    environment:
      vars:
        NODE_VERSION: 18
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coinmob.app

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/.cocoapods

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: xcode-project use-profiles --project ios/CoinMob.xcodeproj

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/CoinMob.xcworkspace \
            --scheme CoinMob \
            --export-options-plist ios/exportOptions.plist \
            --clean

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        submit_to_testflight: true
