workflows:
  react-native-ios:
    name: React Native iOS Build

    environment:
      vars:
        NODE_VERSION: 18

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.znbs.coinmob

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/.cocoapods

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Clean Xcode build (optional but useful)
        script: |
          cd ios
          xcodebuild clean
          cd ..

      - name: Build iOS Archive
        script: |
          xcodebuild \
            -workspace ios/CoinMob.xcworkspace \
            -scheme CoinMob \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/ios/archive.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/ios/archive.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ios/ipa \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive.xcarchive
      - ios/Pods
